<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>القرآن الكريم</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Tajawal',sans-serif;background:#0a0a06;color:#ede8de;min-height:100vh}

    /* ═══ الخلفية الهندسية ═══ */
    .geo-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;overflow:hidden;pointer-events:none}
    .geo-bg svg{width:100%;height:100%;opacity:.04}

    /* ═══ الهيدر ═══ */
    header{position:relative;z-index:2;text-align:center;padding:0 20px 0}
    .header-inner{background:linear-gradient(180deg,#1c1408 0%,transparent 100%);padding:30px 20px 25px;border-bottom:1px solid rgba(212,175,55,.2)}
    .back-btn{display:inline-flex;align-items:center;gap:6px;color:#d4af37;text-decoration:none;font-size:.9rem;opacity:.8;margin-bottom:18px;transition:.2s}
    .back-btn:hover{opacity:1}
    .surah-badge{display:inline-block;background:rgba(212,175,55,.12);border:1px solid rgba(212,175,55,.3);color:#d4af37;font-size:.75rem;padding:3px 12px;border-radius:20px;margin-bottom:10px;letter-spacing:1px}
    h1{font-family:'Amiri',serif;font-size:2.2rem;color:#d4af37;margin-bottom:4px;text-shadow:0 0 40px rgba(212,175,55,.3)}
    .meta{font-size:.82rem;color:#8a7a60;margin-bottom:0}

    /* ═══ البسملة ═══ */
    .bismillah-wrap{text-align:center;padding:30px 20px 10px;position:relative;z-index:2}
    .bismillah{font-family:'Amiri Quran','Amiri',serif;font-size:1.9rem;color:#d4af37;opacity:.95;line-height:1.8}
    .bismillah-line{width:60px;height:1px;background:rgba(212,175,55,.3);margin:12px auto 0}

    /* ═══ القرّاء ═══ */
    .reciters-section{max-width:720px;margin:24px auto 0;padding:0 16px;position:relative;z-index:2}
    .reciters-title{text-align:center;font-size:.78rem;color:#7a6a50;letter-spacing:2px;margin-bottom:12px;text-transform:uppercase}
    .reciters-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    @media(max-width:500px){.reciters-grid{grid-template-columns:repeat(2,1fr)}}
    .reciter-btn{background:rgba(212,175,55,.06);border:1px solid rgba(212,175,55,.15);border-radius:10px;padding:10px 8px;cursor:pointer;transition:.2s;text-align:center;color:#c9a84c;font-size:.78rem;font-family:'Tajawal',sans-serif;line-height:1.3}
    .reciter-btn:hover{background:rgba(212,175,55,.12);border-color:rgba(212,175,55,.35)}
    .reciter-btn.active{background:rgba(212,175,55,.18);border-color:rgba(212,175,55,.6);color:#d4af37;box-shadow:0 0 12px rgba(212,175,55,.15)}
    .reciter-btn .icon{font-size:1.1rem;display:block;margin-bottom:3px}

    /* ═══ مشغّل الصوت ═══ */
    .player-wrap{max-width:720px;margin:14px auto 0;padding:0 16px;position:relative;z-index:2}
    .player-box{background:rgba(212,175,55,.07);border:1px solid rgba(212,175,55,.18);border-radius:14px;padding:16px 20px;display:none}
    .player-box.show{display:block}
    .player-label{font-size:.8rem;color:#8a7a60;margin-bottom:8px;text-align:center}
    audio{width:100%;height:40px;border-radius:8px;outline:none}
    audio::-webkit-media-controls-panel{background:#1a1408}

    /* ═══ الآيات ═══ */
    .ayahs-wrap{max-width:720px;margin:28px auto 0;padding:0 16px 80px;position:relative;z-index:2}
    .ayah{font-family:'Amiri Quran','Amiri',serif;font-size:1.55rem;line-height:2.6;color:#ede8de;padding:16px 0;border-bottom:1px solid rgba(212,175,55,.06);word-spacing:3px}
    .ayah-num{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.25);color:#c9a84c;font-size:.72rem;font-family:'Tajawal',sans-serif;margin-right:6px;vertical-align:middle;flex-shrink:0}

    .loading{text-align:center;padding:70px 20px;color:#5a4a30;font-size:1rem;position:relative;z-index:2}
    .spinner{width:40px;height:40px;border:3px solid rgba(212,175,55,.1);border-top-color:#d4af37;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}

    footer{text-align:center;padding:30px 20px;color:#3a2a10;font-size:.8rem;border-top:1px solid rgba(212,175,55,.07);position:relative;z-index:2}
    .dua{color:#6a5a40;font-size:.85rem;line-height:2}
  </style>
</head>
<body>

<!-- خلفية هندسية إسلامية -->
<div class="geo-bg">
  <svg viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="geo" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
        <polygon points="50,5 95,27.5 95,72.5 50,95 5,72.5 5,27.5" fill="none" stroke="#d4af37" stroke-width=".6"/>
        <polygon points="50,18 82,35 82,65 50,82 18,65 18,35" fill="none" stroke="#d4af37" stroke-width=".4"/>
        <line x1="50" y1="5" x2="50" y2="18" stroke="#d4af37" stroke-width=".3"/>
        <line x1="95" y1="27.5" x2="82" y2="35" stroke="#d4af37" stroke-width=".3"/>
        <line x1="95" y1="72.5" x2="82" y2="65" stroke="#d4af37" stroke-width=".3"/>
        <line x1="50" y1="95" x2="50" y2="82" stroke="#d4af37" stroke-width=".3"/>
        <line x1="5" y1="72.5" x2="18" y2="65" stroke="#d4af37" stroke-width=".3"/>
        <line x1="5" y1="27.5" x2="18" y2="35" stroke="#d4af37" stroke-width=".3"/>
        <circle cx="50" cy="50" r="3" fill="none" stroke="#d4af37" stroke-width=".4"/>
      </pattern>
    </defs>
    <rect width="800" height="800" fill="url(#geo)"/>
  </svg>
</div>

<header>
  <div class="header-inner">
    <a class="back-btn" href="./">← قائمة السور</a>
    <div class="surah-badge" id="surah-badge">سورة •••</div>
    <h1 id="surah-name">...</h1>
    <div class="meta" id="surah-meta"></div>
  </div>
</header>

<div id="bismillah-wrap" class="bismillah-wrap" style="display:none">
  <div class="bismillah">بِسۡمِ ٱللَّهِ ٱلرَّحۡمَٰنِ ٱلرَّحِيمِ</div>
  <div class="bismillah-line"></div>
</div>

<!-- القرّاء -->
<div class="reciters-section">
  <div class="reciters-title">🎧 اختر القارئ للاستماع</div>
  <div class="reciters-grid" id="reciters-grid"></div>
</div>

<!-- مشغّل الصوت -->
<div class="player-wrap">
  <div class="player-box" id="player-box">
    <div class="player-label" id="player-label"></div>
    <audio id="audio-player" controls preload="none"></audio>
  </div>
</div>

<!-- الآيات -->
<div class="ayahs-wrap" id="ayahs">
  <div class="loading">
    <div class="spinner"></div>
    جاري تحميل السورة...
  </div>
</div>

<footer>
  <div class="dua">اللهم اجعل هذا القرآن صدقة جارية عن روح محمد صابر روزي وعائشة ملا<br>وارحمهما واجمعنا بهم في جنات النعيم 🤍</div>
</footer>

<script>
const RECITERS = [
  {name:"محمد أيوب",     base:"https://server16.mp3quran.net/ayyoub2/Rewayat-Hafs-A-n-Assem/"},
  {name:"سعود الشريم",   base:"https://server7.mp3quran.net/shur/"},
  {name:"عبدالولي الأركاني", base:"https://server6.mp3quran.net/arkani/"},
  {name:"علي جابر",      base:"https://server11.mp3quran.net/a_jbr/"},
  {name:"عبدالرحمن السديس", base:"https://server11.mp3quran.net/sds/"},
  {name:"ماهر المعيقلي", base:"https://server12.mp3quran.net/maher/"},
];

const params = new URLSearchParams(window.location.search);
const num = Math.min(Math.max(parseInt(params.get('s'))||1, 1), 114);
const names = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

document.title = `سورة ${names[num-1]} — القرآن الكريم`;
document.getElementById('surah-name').textContent = names[num-1];
document.getElementById('surah-badge').textContent = `سورة ${num}`;

// القرّاء
const grid = document.getElementById('reciters-grid');
const audio = document.getElementById('audio-player');
const playerBox = document.getElementById('player-box');
const playerLabel = document.getElementById('player-label');
let activeBtn = null;

RECITERS.forEach((r, i) => {
  const btn = document.createElement('button');
  btn.className = 'reciter-btn';
  btn.innerHTML = `<span class="icon">🎤</span>${r.name}`;
  btn.onclick = () => {
    if (activeBtn) activeBtn.classList.remove('active');
    btn.classList.add('active');
    activeBtn = btn;
    const url = `${r.base}${String(num).padStart(3,'0')}.mp3`;
    audio.src = url;
    playerLabel.textContent = `🎧 ${r.name} — سورة ${names[num-1]}`;
    playerBox.classList.add('show');
    audio.play();
  };
  grid.appendChild(btn);
});

// الآيات
fetch(`https://api.alquran.cloud/v1/surah/${num}`)
  .then(r => r.json())
  .then(data => {
    const surah = data.data;
    document.getElementById('surah-meta').textContent = `${surah.numberOfAyahs} آية · ${surah.revelationType==='Meccan'?'مكية':'مدنية'}`;
    if (num !== 9) document.getElementById('bismillah-wrap').style.display = 'block';
    const container = document.getElementById('ayahs');
    container.innerHTML = '';
    surah.ayahs.forEach(ayah => {
      const div = document.createElement('div');
      div.className = 'ayah';
      let text = ayah.text;
      if (num !== 1) text = text.replace('بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ ','').replace('بِسۡمِ ٱللَّهِ ٱلرَّحۡمَٰنِ ٱلرَّحِيمِ ','');
      div.innerHTML = `${text} <span class="ayah-num">${ayah.numberInSurah}</span>`;
      container.appendChild(div);
    });
  })
  .catch(() => {
    document.getElementById('ayahs').innerHTML = '<div style="text-align:center;padding:60px;color:#8a5a30">⚠️ تعذّر تحميل السورة — تحقق من الاتصال بالإنترنت</div>';
  });
</script>
</body>
</html>
