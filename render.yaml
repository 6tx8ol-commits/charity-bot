services:
  - type: worker
    name: islamic-bots
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run_all.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: AZKAR_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
